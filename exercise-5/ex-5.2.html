<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordering Columns</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <h1 class = "h1 text-center">Reorder Columns</h1>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6 order-md-2 border p-3 bg-light">
                First Column
            </div>
            <div class="col-md-6 order-md-1 border p-3">
                Second Column
            </div>
        </div>
    </div>

</body>
</html>
